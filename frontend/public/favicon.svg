<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#056449" />
      <stop offset="100%" stop-color="#023b2b" />
    </linearGradient>
    <linearGradient id="cellGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>
  
  <!-- Outer Rounded Card with Shadow -->
  <rect x="32" y="32" width="448" height="448" rx="112" fill="url(#bgGrad)" filter="url(#shadow)" />
  
  <!-- Grid/Table Icon Design representing "apitable" or "a table" -->
  <g fill="#ffffff" opacity="0.95">
    <!-- Top-left main corner cell / accent -->
    <rect x="112" y="112" width="80" height="80" rx="20" fill="url(#cellGrad)" />
    
    <!-- Top header row -->
    <rect x="216" y="112" width="184" height="80" rx="20" fill="#ffffff" opacity="0.9" />
    
    <!-- Left index column cells -->
    <rect x="112" y="216" width="80" height="80" rx="20" fill="#ffffff" opacity="0.7" />
    <rect x="112" y="320" width="80" height="80" rx="20" fill="#ffffff" opacity="0.7" />
    
    <!-- Data cells -->
    <rect x="216" y="216" width="80" height="80" rx="20" fill="#ffffff" opacity="0.8" />
    <rect x="320" y="216" width="80" height="80" rx="20" fill="#ffffff" opacity="0.8" />
    
    <rect x="216" y="320" width="80" height="80" rx="20" fill="#ffffff" opacity="0.8" />
    <rect x="320" y="320" width="80" height="80" rx="20" fill="#ffffff" opacity="0.8" />
  </g>
</svg>